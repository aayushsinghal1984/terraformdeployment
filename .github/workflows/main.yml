name: 'Terraform Main Deployment Pipeline'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target Environment (sit, uat, production)'
        required: true
        default: 'sit'
        type: choice
        options:
          - sit
          - uat
          - production
      working_dir:
        description: 'Root directory of your Terraform modules'
        required: true
        default: 'terraform/azure'
        type: string

env:
  # Global variables available to all steps and underlying scripts
  TARGET_ENV: ${{ github.event.inputs.target_env || 'sit' }}
  WORKING_DIR: ${{ github.event.inputs.working_dir || 'terraform/azure' }}
  IS_APPLY: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

jobs:
  # 1. Run Static Code Analysis (Linting)
  tflint-check:
    name: 'Linting'
    uses: ./.github/workflows/tflint-template.yml
    with:
      target_env: ${{ github.event.inputs.target_env || 'sit' }}
      working_dir: ${{ github.event.inputs.working_dir || 'terraform/azure' }}
      is_apply: false
      tfc_org: ${{ vars.TF_CLOUD_ORG }}
    secrets: inherit

  # 2. Run Security Vulnerability Scanning
  tfsec-scan:
    name: 'Security Scan'
    needs: tflint-check
    uses: ./.github/workflows/tfsec-template.yml
    with:
      target_env: ${{ github.event.inputs.target_env || 'sit' }}
      working_dir: ${{ github.event.inputs.working_dir || 'terraform/azure' }}
      is_apply: false
      tfc_org: ${{ vars.TF_CLOUD_ORG }}
    secrets: inherit

  # 3. Generate Terraform Plan and Upload Binary Artifact
  terraform-plan:
    name: 'TF Plan'
    needs: tfsec-scan
    uses: ./.github/workflows/init-plan-template.yml
    with:
      target_env: ${{ github.event.inputs.target_env || 'sit' }}
      working_dir: ${{ github.event.inputs.working_dir || 'terraform/azure' }}
      is_apply: false
      tfc_org: ${{ vars.TF_CLOUD_ORG }}
    secrets: inherit

  # 4. Open Policy Agent (OPA) Compliance Check
  opa-compliance:
    name: 'OPA Compliance'
    needs: terraform-plan
    uses: ./.github/workflows/opa-check-template.yml
    with:
      target_env: ${{ github.event.inputs.target_env || 'sit' }}
      working_dir: ${{ github.event.inputs.working_dir || 'terraform/azure' }}
      is_apply: false
      tfc_org: ${{ vars.TF_CLOUD_ORG }}
    secrets: inherit

  # 5. Manual Approval Gate 
  manual-approval:
    name: 'Approval Gate'
    needs: opa-compliance
    # Evaluates the global env string context cleanly as a boolean expression
    if: ${{ fromJSON(env.IS_APPLY) }}
    uses: ./.github/workflows/manual-validation-template.yml

  # 6. Execute Terraform Apply, Tagging and Versioning
  terraform-apply:
    name: 'TF Apply & Tag'
    needs: manual-approval
    if: ${{ fromJSON(env.IS_APPLY) }}
    uses: ./.github/workflows/apply-tagging-template.yml
    with:
      target_env: ${{ github.event.inputs.target_env || 'sit' }}
      working_dir: ${{ github.event.inputs.working_dir || 'terraform/azure' }}
      is_apply: true
      tfc_org: ${{ vars.TF_CLOUD_ORG }}
    secrets: inherit