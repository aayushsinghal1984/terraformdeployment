name: "Infrastructure Provisioning Pipeline"

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Select Environment to Deploy'
        required: true
        default: 'production'
        type: choice
        options: [development, sit, uat, production]
      working_dir:
        description: 'Select Working Directory / Component'
        required: true
        default: '.'
        type: string
      just_plan:
        description: 'Check to ONLY run Plan (No Apply)'
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  setup-env:
    name: 'Environment & Path Evaluation'
    runs-on: windows-latest
    outputs:
      resolved_env: ${{ steps.resolver.outputs.resolved_env }}
      resolved_dir: ${{ steps.resolver.outputs.resolved_dir }}
      skip_apply: ${{ steps.resolver.outputs.skip_apply }}
      is_apply: ${{ steps.resolver.outputs.is_apply }}
    steps:
      - uses: actions/checkout@v4
      - id: resolver
        shell: pwsh
        run: |
          $env = "${{ github.event.inputs.target_env }}"
          if (-not $env) { $env = "production" }          
          $dir = "${{ github.event.inputs.working_dir }}"
          if (-not $dir) { $dir = "." }          
          $skip = "${{ github.event.inputs.just_plan }}"
          if (-not $skip) { $skip = "false" } 
          $apply = if ($skip -eq "true") { "false" } else { "true" }        
          "resolved_env=$env" >> $env:GITHUB_OUTPUT
          "resolved_dir=$dir" >> $env:GITHUB_OUTPUT
          "skip_apply=$skip" >> $env:GITHUB_OUTPUT
          "is_apply=$apply" >> $env:GITHUB_OUTPUT

  # STAGE 2: Code Quality & Security (Separate Jobs)
  lint-check:
    name: 'Terraform Lint'
    needs: setup-env
    uses: ./.github/workflows/tf-lint.yml
    with:
      target_env: ${{ needs.setup-env.outputs.resolved_env }}
      working_dir: ${{ needs.setup-env.outputs.resolved_dir }}
    secrets: inherit

  security-check:
    name: 'Terraform Security (tfSec)'
    needs: setup-env
    uses: ./.github/workflows/tf-tfSec.yml
    with:
      target_env: ${{ needs.setup-env.outputs.resolved_env }}
      working_dir: ${{ needs.setup-env.outputs.resolved_dir }}
    secrets: inherit

  test-check:
    name: 'Terraform Test'
    needs: setup-env
    uses: ./.github/workflows/tf-test.yml
    with:
      target_env: ${{ needs.setup-env.outputs.resolved_env }}
      working_dir: ${{ needs.setup-env.outputs.resolved_dir }}
    secrets: inherit

  # STAGE 3: Terraform Init, Validate & Plan
  terraform-plan:
    name: 'TF Validate & Plan'
    needs: [setup-env, lint-check, security-check, test-check]
    uses: ./.github/workflows/tf-init-validate.yml
    with:
      target_env: ${{ needs.setup-env.outputs.resolved_env }}
      working_dir: ${{ needs.setup-env.outputs.resolved_dir }}
    secrets: inherit

  # STAGE 4: OPA Policy Check
  opa-check:
    name: 'OPA Policy Check'
    needs: [setup-env, terraform-plan]
    uses: ./.github/workflows/tf-opa-check.yml
    with:
      target_env: ${{ needs.setup-env.outputs.resolved_env }}
      working_dir: ${{ needs.setup-env.outputs.resolved_dir }}
    secrets: inherit

  # STAGE 5: Manual Approval Gate
  manual-validation:
    name: 'Manual Approval Gate'
    needs: [setup-env, opa-check]
    if: needs.setup-env.outputs.skip_apply == 'false'
    uses: ./.github/workflows/manual-validation.yml

  # STAGE 6: Terraform Apply
  terraform-apply:
    name: 'TF Apply / Deploy'
    needs: [setup-env, manual-validation]
    if: |
      ((github.event_name == 'push' && github.ref_name == 'main') || github.event_name == 'workflow_dispatch') && 
      needs.setup-env.outputs.skip_apply == 'false'
    uses: ./.github/workflows/tf-apply.yml
    with:
      target_env: ${{ needs.setup-env.outputs.resolved_env }}
      working_dir: ${{ needs.setup-env.outputs.resolved_dir }}
      is_apply: ${{ needs.setup-env.outputs.is_apply }}
    secrets: inherit
