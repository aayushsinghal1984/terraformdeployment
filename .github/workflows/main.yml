name: "Automated Infrastructure Provisioning Pipeline"

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Select Environment to Deploy'
        required: true
        default: 'production'
        type: choice
        options: [development, sit, uat, production]
      working_dir:
        description: 'Select Working Directory / Component'
        required: true
        default: '.'
        type: string
      just_plan:
        description: 'Check to ONLY run Plan (No Apply)'
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  setup-env:
    name: 'Environment & Path Evaluation'
    runs-on: windows-latest
    outputs:
      resolved_env: ${{ steps.resolver.outputs.resolved_env }}
      resolved_dir: ${{ steps.resolver.outputs.resolved_dir }}
      skip_apply: ${{ steps.resolver.outputs.skip_apply }}
    steps:
      - uses: actions/checkout@v4
      - id: resolver
        run: |
          # ... (Aapka existing logic yahan rahega)
          "resolved_env=$envChoice" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "resolved_dir=$dirChoice" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "skip_apply=$justPlan" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  # STAGE 2: Code Quality & Security (Parallel Execution)
  tf-quality-checks:
    name: 'Lint & Security Scan'
    needs: setup-env
    strategy:
      matrix:
        workflow: ['tf-lint.yml', 'tf-tfSec.yml', 'tf-test.yml']
    uses: ./.github/workflows/tf-lint.yml
    with:
      working_dir: ${{ needs.setup-env.outputs.resolved_dir }}
    secrets: inherit

  # STAGE 3: Terraform Init, Validate & Plan
  terraform-plan:
    name: 'TF Validate & Plan'
    needs: [setup-env, tf-quality-checks]
    uses: ./.github/workflows/tf-init-validate.yml # Updated Path
    with:
      target_env: ${{ needs.setup-env.outputs.resolved_env }}
      working_dir: ${{ needs.setup-env.outputs.resolved_dir }}
    secrets: inherit

  # STAGE 4: OPA Policy Check
  opa-check:
    name: 'OPA Policy Check'
    needs: [setup-env, terraform-plan]
    uses: ./.github/workflows/tf-opa-check.yml
    with:
      target_env: ${{ needs.setup-env.outputs.resolved_env }}
      working_dir: ${{ needs.setup-env.outputs.resolved_dir }}
    secrets: inherit

  # STAGE 5: Manual Approval Gate
  manual-validation:
    name: 'Manual Approval Gate'
    needs: [setup-env, opa-check]
    if: needs.setup-env.outputs.skip_apply == 'false'
    uses: ./.github/workflows/manual-validation.yml

  # STAGE 6: Terraform Apply
  terraform-apply:
    name: 'TF Apply / Deploy'
    needs: [setup-env, manual-validation]
    if: |
      ((github.event_name == 'push' && github.ref_name == 'main') || github.event_name == 'workflow_dispatch') && 
      needs.setup-env.outputs.skip_apply == 'false'
    uses: ./.github/workflows/tf-apply.yml
    with:
      target_env: ${{ needs.setup-env.outputs.resolved_env }}
      working_dir: ${{ needs.setup-env.outputs.resolved_dir }}
    secrets: inherit