name: 'Terraform Main Deployment Pipeline'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target Environment (sit, uat, production)'
        required: true
        default: 'sit'
        type: choice
        options:
          - sit
          - uat
          - production
      working_dir:
        description: 'Root directory of your Terraform modules'
        required: true
        default: 'terraform'
        type: string

# FIX: Permissions ab root level par hain aur sahi se indented hain
permissions:
  contents: write
  id-token: write

jobs:
  # 1. Run Static Code Analysis (Linting)
  tflint-check:
    name: 'Linting'
    uses: aayushsinghal1984/terraformdeployment/.github/workflows/tf-tflint.yml@531faed89767cda0f81af3ee43d17930158ebe3e
    with:
      target_env: ${{ inputs.target_env || 'sit' }}
      working_dir: ${{ inputs.working_dir || 'terraform/azure' }}
      is_apply: false
      tfc_org: ${{ vars.TF_CLOUD_ORG }}
    secrets: inherit

  # 2. Run Security Vulnerability Scanning
  tfsec-scan:
    name: 'Security Scan'
    needs: tflint-check
    uses: aayushsinghal1984/terraformdeployment/.github/workflows/tf-tfSec.yml@531faed89767cda0f81af3ee43d17930158ebe3e
    with:
      target_env: ${{ inputs.target_env || 'sit' }}
      working_dir: ${{ inputs.working_dir || 'terraform/azure' }}
      is_apply: false
      tfc_org: ${{ vars.TF_CLOUD_ORG }}
    secrets: inherit

  # 3. Generate Terraform Plan and Upload Binary Artifact
  terraform-plan:
    name: 'TF Plan'
    needs: tfsec-scan
    uses: aayushsinghal1984/terraformdeployment/.github/workflows/tf-init-validate.yml@531faed89767cda0f81af3ee43d17930158ebe3e
    with:
      target_env: ${{ inputs.target_env || 'sit' }}
      working_dir: ${{ inputs.working_dir || 'terraform/azure' }}
      is_apply: false
      tfc_org: ${{ vars.TF_CLOUD_ORG }}
    secrets: inherit

  # 4. Open Policy Agent (OPA) Compliance Check
  opa-compliance:
    name: 'OPA Compliance'
    needs: terraform-plan
    uses: aayushsinghal1984/terraformdeployment/.github/workflows/tf-opa-check.yml@531faed89767cda0f81af3ee43d17930158ebe3e
    with:
      target_env: ${{ inputs.target_env || 'sit' }}
      working_dir: ${{ inputs.working_dir || 'terraform/azure' }}
      is_apply: false
      tfc_org: ${{ vars.TF_CLOUD_ORG }}
    secrets: inherit

  # 5. Manual Approval Gate 
  manual-approval:
    name: 'Approval Gate'
    needs: opa-compliance
    uses: aayushsinghal1984/terraformdeployment/.github/workflows/manual-validation.yml@531faed89767cda0f81af3ee43d17930158ebe3e

  # 6. Execute Terraform Apply, Tagging and Versioning
  terraform-apply:
    name: 'TF Apply & Tag'
    needs: manual-approval
    uses: aayushsinghal1984/terraformdeployment/.github/workflows/tf-apply.yml@531faed89767cda0f81af3ee43d17930158ebe3e
    with:
      target_env: ${{ inputs.target_env || 'sit' }}
      working_dir: ${{ inputs.working_dir || 'terraform/azure' }}
      is_apply: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
      tfc_org: ${{ vars.TF_CLOUD_ORG }}
    secrets: inherit
