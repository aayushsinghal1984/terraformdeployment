name: Reusable Terraform Action

on:
  workflow_call:
    inputs:
      target_env: { type: string, required: false, default: "none" }
      working_dir: { type: string, required: false, default: "." }
      is_apply: { type: boolean, default: false }
    secrets:
      TFE_API_TOKEN: 
        required: true

jobs:
  terraform-task:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TFE_API_TOKEN }}
          
      - name: Terraform Init
        working-directory: ${{ inputs.working_dir }}
        run: |
          Write-Host "Checking files in:"
          Get-Location
          Get-ChildItem
          terraform init -no-color

      - name: Terraform Plan
        working-directory: ${{ inputs.working_dir }}
        run: terraform plan -no-color

      - name: Terraform Apply
        working-directory: ${{ inputs.working_dir }}
        if: ${{ inputs.is_apply == true }} 
        env:
          TFE_TOKEN: ${{ secrets.TFE_API_TOKEN }}
          TF_LOG: DEBUG
        run: terraform apply -auto-approve
