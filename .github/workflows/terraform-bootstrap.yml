name: Reusable Terraform Action
on:
  workflow_call:
    inputs:
      working_dir: { type: string, default: "terraform-bootstrap" }
      is_apply: { type: boolean, default: true }
    secrets:
      TFE_API_TOKEN: { required: true }

jobs:
  terraform-task:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: ${{ inputs.working_dir }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TFE_API_TOKEN }}
          
      - name: Terraform Init
        working-directory: ${{ inputs.working_dir }}
        run: |
          Write-Host "Checking files in:"
          Get-Location
          Get-ChildItem
          terraform init -no-color

      - name: Terraform Plan
        working-directory: ${{ inputs.working_dir }}
        run: terraform plan -no-color

      - name: Terraform Apply
        working-directory: ${{ inputs.working_dir }}
        if: ${{ inputs.is_apply == true }} 
        env:
          TFE_TOKEN: ${{ secrets.TFE_API_TOKEN }}
          TF_LOG: DEBUG
        run: terraform apply -auto-approve
