name: Reusable Terraform Action

on:
  workflow_call:
    inputs:
      target_env: { type: string, required: false }
      working_dir: { type: string, required: false, default: "." }
      is_apply: { type: boolean, default: false }
    secrets:
      TFE_API_TOKEN: 
        required: true

jobs:
  terraform-task:
    runs-on: windows-latest
    defaults:
      run:
       
        working-directory: ./terraform-bootstrap
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TFE_API_TOKEN }}
          
      - name: Debug Path Info
        shell: pwsh
        run: |
          Write-Host "Current Directory: $(Get-Location)"
          Write-Host "Files in Directory:"
          Get-ChildItem -Path . -Recurse | Select-Object FullName''

      - name: Terraform Init
        working-directory: ./terraform-bootstrap
        env:
          TF_LOG: DEBUG
        run: |
          terraform init -no-color > terraform_init.log
        
      - name: Terraform Plan
        run: terraform plan -no-color

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="tfe_token=${{ secrets.TF_API_TOKEN }}"
