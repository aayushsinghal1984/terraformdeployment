name: Reusable Terraform Action
on:
  workflow_call:
    inputs:      
      target_env: { type: string, required: false, default: "bootstrap" }
      working_dir: { type: string, required: false, default: "." }
      is_apply: { type: boolean, default: true }
    secrets:
      TFE_API_TOKEN: { required: true }

jobs:
  terraform-task:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: ${{ inputs.working_dir }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TFE_API_TOKEN }}
          
      - name: Terraform Init
        run: terraform init -no-color

      - name: Terraform Plan
        run: terraform plan -no-color

      - name: Terraform Apply
        if: ${{ inputs.is_apply == true }}
        run: terraform apply -auto-approve -no-color
