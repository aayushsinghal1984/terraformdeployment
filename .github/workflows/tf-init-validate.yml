name: 'Terraform init plan Template'

on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
        description: 'Target Environment (sit, uat, production)'
      working_dir:          
        required: true
        type: string
      is_apply:
        required: true
        type: boolean
        description: 'Set to true to run ONLY terraform apply from artifact'
      tfc_org:
        required: true
        type: string
        description: 'Terraform Cloud Organization Name'
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      TF_API_TOKEN:
        required: true

env:  
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
  TF_CLOUD_ORGANIZATION: ${{ inputs.tfc_org }}

jobs:
  core-engine:
    name: 'Execute TF Ops'
    runs-on: windows-latest
    environment: ${{ inputs.target_env }}
    
    permissions:
      id-token: write
      contents: write

    steps:
      - name: 'Checkout Source Code'
        uses: actions/checkout@v4

      - name: Install JQ
        shell: pwsh
        run: choco install jq -y --no-progress

      - name: 'Azure Login (OIDC)'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          enable-AzPSSession: true 

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false 
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: 'Terraform Initialization'
        shell: pwsh
        run: |
          $envName = "${{ inputs.target_env }}"
          if ($envName -eq "development") { $envName = "dev" }
          $workspaceName = "infra-$envName"          
          terraform -chdir="${{ inputs.working_dir }}" init -input=false -cloud-workspace=$workspaceName
