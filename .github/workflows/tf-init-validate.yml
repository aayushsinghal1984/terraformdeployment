name: 'Terraform init plan Template'

on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
        description: 'Target Environment (sit, uat, production)'
      working_dir:          
        required: true
        type: string
      is_apply:
        required: true
        type: boolean
        description: 'Set to true to run ONLY terraform apply from artifact'
      tfc_org:
        required: true
        type: string
        description: 'Terraform Cloud Organization Name'
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      TF_API_TOKEN:
        required: true

env:  
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
  TF_CLOUD_ORGANIZATION: ${{ inputs.tfc_org }}

jobs:
  core-engine:
    name: 'Execute TF Ops'
    runs-on: windows-latest
    environment: ${{ inputs.target_env }}
    
    permissions:
      id-token: write
      contents: write

    steps:
      - name: 'Checkout Source Code'
        uses: actions/checkout@v4

      - name: Install JQ
        shell: pwsh
        run: choco install jq -y --no-progress

      - name: 'Azure Login (OIDC)'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          enable-AzPSSession: true 

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false 
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Initialization & Workspace Auto-Creation
        shell: pwsh
        run: |
          # 1. Setup Variables
          $envName = "${{ inputs.target_env }}"
          if ($envName -eq "development") { $envName = "dev" }
          $workspaceName = "infra-$envName"
          
          # 2. Debugging: Print environment state
          Write-Host "--- Debugging Diagnostics ---"
          Write-Host "Target Workspace: $workspaceName"
          Write-Host "Organization: ${{ env.TF_CLOUD_ORGANIZATION }}"
          Write-Host "Working Directory: ${{ inputs.working_dir }}"
          
          # 3. Debugging: Check for existing local state that might conflict
          $tfFolder = Join-Path "${{ inputs.working_dir }}" ".terraform"
          if (Test-Path $tfFolder) {
              Write-Host "Existing .terraform directory found. Removing for clean init."
              Remove-Item -Path $tfFolder -Recurse -Force
          }
      
          # 4. Save Workspace to Environment
          "TF_WORKSPACE=$workspaceName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $env:TF_WORKSPACE = $workspaceName
      
          # 5. Debugging: List workspaces reachable by current credentials
          Write-Host "Available Workspaces in Organization:"
          terraform -chdir="${{ inputs.working_dir }}" workspace list
          Write-Host "--- End Diagnostics ---"
      
          # 6. Initialize
          terraform -chdir="${{ inputs.working_dir }}" init -input=false
