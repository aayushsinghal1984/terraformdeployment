name: 'Terraform init plan Template'

on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
        description: 'Target Environment (sit, uat, production)'
      working_dir:          
        required: true
        type: string
      is_apply:
        required: true
        type: boolean
        description: 'Set to true to run ONLY terraform apply from artifact'
      tfc_org:
        required: true
        type: string
        description: 'Terraform Cloud Organization Name'
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      TF_API_TOKEN:
        required: true

env:  
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
  TF_CLOUD_ORGANIZATION: "ISCINFRA"

jobs:
  core-engine:
    name: 'Execute TF Ops'
    runs-on: windows-latest
    environment: ${{ inputs.target_env }}
    
    permissions:
      id-token: write
      contents: write

    steps:
      - name: 'Checkout Source Code'
        uses: actions/checkout@v4

      - name: Install JQ
        shell: pwsh
        run: choco install jq -y --no-progress

      - name: 'Azure Login (OIDC)'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          enable-AzPSSession: true 

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false 
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Initialization & Workspace Auto-Creation
        shell: pwsh
        env:
          # यह सुनिश्चित करता है कि Terraform को सही Organization पता हो
          TF_CLOUD_ORGANIZATION: "ISCINFRA" 
        run: |
          # --- 1. Variables Setup ---
          $envName = "${{ inputs.target_env }}"
          if ($envName -eq "development") { $envName = "dev" }
          $workspaceName = "infra-$envName"
          
          # --- 2. Debugging Diagnostics ---
          Write-Host "--- [DEBUG] Pipeline Variables ---"
          Write-Host "Target Env: $envName"
          Write-Host "Workspace Name: $workspaceName"
          Write-Host "Organization: $env:TF_CLOUD_ORGANIZATION"
          
          # --- 3. Clean Slate (पुराना कैश हटाना) ---
          $tfFolder = Join-Path "${{ inputs.working_dir }}" ".terraform"
          if (Test-Path $tfFolder) {
              Write-Host "[DEBUG] पुरानी .terraform डायरेक्टरी हटा रहे हैं..."
              Remove-Item -Path $tfFolder -Recurse -Force
          }
      
          # --- 4. Workspace Verification (महत्वपूर्ण स्टेप) ---
          Write-Host "[DEBUG] उपलब्ध वर्कस्पेस की सूची:"
          # यह कमांड दिखाएगा कि क्या वाकई 'infra-sit' वहां मौजूद है
          terraform -chdir="${{ inputs.working_dir }}" workspace list
          
          # --- 5. Initialization ---
          Write-Host "[DEBUG] Terraform Init शुरू कर रहे हैं..."
          terraform -chdir="${{ inputs.working_dir }}" init -input=false
