name: 'Terraform init plan Template'

on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
        description: 'Target Environment (sit, uat, production)'
      working_dir:          
        required: true
        type: string
      is_apply:
        required: true
        type: boolean
        description: 'Set to true to run ONLY terraform apply from artifact'
      tfc_org:
        required: true
        type: string
        description: 'Terraform Cloud Organization Name'tfc_org:
        required: true
        type: string
        description: 'Terraform Cloud Organization Name'
      tfc_org:
        required: true
        type: string
        description: 'Terraform Cloud Organization Name'tfc_org:
        required: true
        type: string
        description: 'Terraform Cloud Organization Name'  

env:  
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
  TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORG }}

jobs:
  core-engine:
    name: 'Execute TF Ops'
    runs-on: windows-latest
    environment: ${{ inputs.target_env }}
    
    permissions:
      id-token: write
      contents: write

    steps:
      - name: 'Checkout Source Code'
        uses: actions/checkout@v4

      - name: Install 
        shell: pwsh
        run: choco install jq -y

      - name: 'Azure Login (OIDC)'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          enable-AzPSSession: true     
      

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false 
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: 'Terraform Initialization & Workspace Auto-Creation'
        shell: pwsh
        run: |          
          $envName = "${{ inputs.target_env }}"  
          if ($envName -eq "development") { $envName = "dev" }          
          $workspaceName = "infra-$envName"
          Write-Output "Targeting Workspace on TF Cloud: $workspaceName"     
          
          # GitHub Environment variables export (Windows context)
          "TF_WORKSPACE=$workspaceName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          
          # Current session ke liye environment variables inject karna
          $env:TF_WORKSPACE = $workspaceName
          $env:TF_CLOUD_ORGANIZATION = "${{ env.TF_CLOUD_ORGANIZATION }}"
          
          # Is command ko chalate hi TFC backend dynamic workspace check aur creation dono auto-perform karega
          terraform -chdir="${{ inputs.working_dir }}" init -input=false
         

      - name: 'Generate Terraform Plan'
        if: ${{ inputs.is_apply == false }}
        shell: pwsh
        run: |
          $targetDir = "${{ inputs.working_dir }}"
          if ([string]::IsNullOrWhiteSpace($targetDir)) { $targetDir = "." }
          $jsonPath = Join-Path $env:GITHUB_WORKSPACE "$targetDir/tfplan.json"         
          $Path = (Get-Command jq).Source 
          
          # Current step variables map
          $envName = "${{ inputs.target_env }}"  
          if ($envName -eq "development") { $envName = "dev" }          
          $env:TF_WORKSPACE = "infra-$envName"
          $env:TF_CLOUD_ORGANIZATION = "${{ env.TF_CLOUD_ORGANIZATION }}"
          
          # Terraform plan generate
          & terraform -chdir="$targetDir" plan -out="tfplan.binary"
          if ($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne 2) { Write-Error "Plan Failed"; exit 1 }
          
          # Windows compatibility UTF8 redirect fix
          & terraform -chdir="$targetDir" show -json tfplan.binary | Out-File -FilePath "$jsonPath" -Encoding utf8
          
          # Resource Counts Calculate 
          $create = & $Path -r '[.resource_changes[] | select(.change.actions[] == "create")] | length' "$jsonPath"
          $update = & $Path -r '[.resource_changes[] | select(.change.actions[] == "update")] | length' "$jsonPath"
          $delete = & $Path -r '[.resource_changes[] | select(.change.actions[] == "delete")] | length' "$jsonPath"
          
          # Summary Table creation
          "Terraform Plan Summary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          "| Action | Count |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "| :--- | :--- |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "|  Create | $create |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "|  Update | $update |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "|  Delete | $delete |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          
          # Detailed Resource List 
          "`n#  Detailed Resource Changes" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "| Resource Name | Action |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "| :--- | :--- |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          
          $resources = & $Path -r '.resource_changes[] | select(.change.actions[] != "no-op") | "\(.address) | \(.change.actions[])"' "$jsonPath"
          
          if (-not [string]::IsNullOrWhiteSpace($resources)) {
              $resources | ForEach-Object { "| $_ |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8 }
          } else {
              "| No changes detected | - |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

      - name: 'Upload Terraform Plan Artifact'
        if: ${{ inputs.is_apply == false }}
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          # FIX: Windows directory slash compatibility thik ki gayi
          path: "${{ github.workspace }}\\${{ inputs.working_dir }}\\tfplan.binary"
          retention-days: 1