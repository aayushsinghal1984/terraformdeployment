name: 'Terraform tfSec Template'

on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
        description: 'Target Environment (sit, uat, production)'
      working_dir:          
        required: true
        type: string
      is_apply:
        required: true
        type: boolean
        description: 'Set to true to run ONLY terraform apply from artifact'
      tfc_org:
        required: true
        type: string
        description: 'Terraform Cloud Organization Name'
    # Parent pipeline se secrets inherit karne ke liye ya receive karne ke liye secrets block define kiya
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      TF_API_TOKEN:
        required: true

env:  
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

jobs:
  core-engine:
    name: 'Execute TF Ops'
    runs-on: windows-latest
    environment: ${{ inputs.target_env }}
    
    permissions:
      id-token: write
      contents: write

    steps:
      - name: 'Checkout Source Code'
        uses: actions/checkout@v4

      - name: Install JQ via Choco
        shell: pwsh
        run: |
          choco install jq -y --no-progress

      - name: 'Azure Login (OIDC)'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          enable-AzPSSession: true         
         
      - name: 'Run tfsec Security Scan'
        # ${{ }} hata diya, yeh safe aur correct tarika hai
        if: inputs.is_apply == false 
        shell: pwsh
        run: |         
          $tfsecVersion = "v1.28.14"
          $downloadUrl = "https://github.com/aquasecurity/tfsec/releases/download/$tfsecVersion/tfsec-windows-amd64.exe"
          
          Write-Host "Downloading tfsec..."
          Invoke-WebRequest -Uri $downloadUrl -OutFile "tfsec.exe"
          
          # Path ko Windows compatible banane ke liye Resolve-Path use kiya taaki slashes ki dikkat na ho
          $resolvedPath = Resolve-Path "${{ inputs.working_dir }}"
          $tfvarsPath = "$resolvedPath/terraform.tfvars"
          
          Write-Host "Running tfsec scan on: $resolvedPath"
          ./tfsec.exe "$resolvedPath" --tfvars-file "$tfvarsPath"
        continue-on-error: false
