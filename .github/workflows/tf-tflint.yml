name: 'Terraform Tflint Template'

on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
        description: 'Target Environment (sit, uat, production)'
      working_dir:          
        required: true
        type: string
      is_apply:
        required: true
        type: boolean
        description: 'Set to true to run ONLY terraform apply from artifact'
      tfc_org:
        required: true
        type: string
        description: 'Terraform Cloud Organization Name'
    # Parent workflow se incoming secrets ko receive karne ke liye declaration
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      TF_API_TOKEN:
        required: true

env:  
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

jobs:
  core-engine:
    name: 'Execute TF Ops'
    runs-on: windows-latest
    environment: ${{ inputs.target_env }}
    
    permissions:
      id-token: write
      contents: write

    steps:
      - name: 'Checkout Source Code'
        uses: actions/checkout@v4

      # Windows par JQ aur TFLint dono ko Choco se install karna best hai
      - name: 'Install JQ and TFLint via Choco'
        shell: pwsh
        run: |
          choco install jq -y --no-progress
          choco install tflint -y --no-progress

      - name: 'Azure Login (OIDC)'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          enable-AzPSSession: true
          
      - name: 'Run TFLint Scan'
        if: inputs.is_apply == false
        shell: pwsh
        run: |
          # Windows compatibility ke liye working directory ka absolute path nikalna safe hai
          $resolvedPath = (Resolve-Path "${{ inputs.working_dir }}").Path
          
          Write-Host "Initializing TFLint in: $resolvedPath"
          tflint --init --chdir="$resolvedPath"
          
          Write-Host "Running TFLint inspection..."
          tflint -f compact --chdir="$resolvedPath"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
